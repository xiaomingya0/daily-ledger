<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f1f5f9;color:#1e293b;line-height:1.5}
.nav{background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;padding:0 10px;height:52px;position:sticky;top:0;z-index:100}
.nb{font-weight:700;cursor:pointer;color:#1e293b;font-size:.95rem}.nb span{color:#2563eb}
.nt{display:flex;gap:2px;flex:1;overflow-x:auto;margin:0 4px}
.nt button{padding:5px 8px;border:none;background:transparent;color:#64748b;font-size:.78rem;cursor:pointer;border-radius:5px;white-space:nowrap}
.nt button.a{background:#dbeafe;color:#2563eb;font-weight:600}
.mn{max-width:820px;margin:0 auto;padding:10px;padding-bottom:64px}
.fb{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;align-items:center}
.fb .sg{display:flex;background:#fff;border:1px solid #e2e8f0;border-radius:5px;overflow:hidden}
.fb .sg button{padding:3px 8px;border:none;background:transparent;color:#64748b;font-size:.7rem;cursor:pointer}
.fb .sg button.a{background:#2563eb;color:#fff;font-weight:600}
.fb input[type=month]{padding:3px 6px;border:1px solid #e2e8f0;border-radius:5px;font-size:.72rem;background:#fff;color:#1e293b}
.fb .sb{margin-left:auto;font-size:.7rem;color:#64748b;display:flex;gap:8px}
.entry{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#fff;border-radius:8px;margin-top:6px;box-shadow:0 1px 2px rgba(0,0,0,.06);position:relative}
.ei{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.ei.e{background:#fee2e2;color:#ef4444}.ei.i{background:#d1fae5;color:#10b981}
.ei.ev{background:#ede9fe;color:#8b5cf6}.ei.p{background:#fef3c7;color:#f59e0b}
.eb{flex:1;min-width:0}.et{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.bd{font-size:.63rem;font-weight:600;padding:1px 6px;border-radius:3px}
.bd.e{background:#fee2e2;color:#ef4444}.bd.i{background:#d1fae5;color:#10b981}
.bd.ev{background:#ede9fe;color:#8b5cf6}.bd.p{background:#fef3c7;color:#f59e0b}
.ea{font-weight:700;font-size:.85rem;margin-left:auto;white-space:nowrap}
.ea.e{color:#ef4444}.ea.i{color:#10b981}
.etl{font-size:.82rem;color:#1e293b;margin-top:1px;font-weight:500}
.em{font-size:.68rem;color:#94a3b8;margin-top:1px;display:flex;gap:6px;flex-wrap:wrap}
.es{font-size:.66rem;display:flex;align-items:center;gap:3px}.es.d{color:#10b981}.es.p{color:#f59e0b}
.prg{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border-radius:8px;margin-bottom:6px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.prg .pb{flex:1;background:#f1f5f9;border-radius:3px;height:6px;overflow:hidden}
.prg .pf{height:6px;border-radius:3px;background:#10b981}
.emp{text-align:center;padding:40px 16px;color:#94a3b8}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sc{background:#fff;border-radius:7px;padding:10px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.sc .v{font-size:1rem;font-weight:700;margin-top:1px}
.sc .v.g{color:#10b981}.sc .v.r{color:#ef4444}.sc .v.p{color:#8b5cf6}
.bk{background:#fff;border-radius:7px;padding:10px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:8px}
.bk .bt{font-size:.7rem;color:#64748b;margin-bottom:5px;font-weight:600}
.bk .br{display:flex;align-items:center;gap:5px;padding:3px 0;font-size:.7rem}
.bk .br .bn{flex:1;color:#1e293b}.bk .br .ba{font-weight:600;color:#1e293b}
.bk .br .bp{color:#94a3b8;width:28px;text-align:right;font-size:.65rem}
.bk .bb{background:#f1f5f9;border-radius:2.5px;height:4px;overflow:hidden;margin-top:1px}
.bk .bf{height:4px;border-radius:2.5px}
.bn{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;display:flex;height:52px;z-index:100;max-width:820px;margin:0 auto}
.bn .bi{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:.55rem;color:#94a3b8;border:none;background:transparent;cursor:pointer}
.bn .bi.a{color:#2563eb}
.fab{position:fixed;bottom:62px;right:max(12px,calc(50vw - 400px + 12px));width:44px;height:44px;border:none;border-radius:50%;background:#2563eb;color:#fff;font-size:1.15rem;cursor:pointer;box-shadow:0 3px 10px rgba(37,99,235,.35);z-index:200}
.mo{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.15s}
.mo.open{opacity:1;pointer-events:auto}
.mo .ms{background:#fff;border-radius:14px 14px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:0 16px 20px;transform:translateY(30px);transition:.15s}
.mo.open .ms{transform:translateY(0)}.mo .ms .mh{width:32px;height:4px;background:#e2e8f0;border-radius:2px;margin:8px auto 12px}
.mo .ms h3{font-size:.95rem;margin-bottom:10px}
.tt{display:flex;gap:4px;margin-bottom:10px}.tt button{flex:1;padding:6px 4px;border:none;border-radius:5px;font-size:.7rem;cursor:pointer}
.tt .ta{background:#2563eb;color:#fff;font-weight:600}.tt .tn{background:#f1f5f9;color:#64748b}
.fg{margin-bottom:10px}.fg label{display:block;font-size:.72rem;font-weight:600;color:#64748b;margin-bottom:2px}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 9px;border:1px solid #e2e8f0;border-radius:5px;font-size:.82rem;background:#fff;color:#1e293b;font-family:inherit}
.fg textarea{resize:vertical;min-height:50px}.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-p{width:100%;padding:9px;border:none;border-radius:5px;background:#2563eb;color:#fff;font-size:.82rem;font-weight:600;cursor:pointer}
.pr{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:400;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:.15s}
.pr.open{opacity:1;pointer-events:auto}
.pr .ps{background:#fff;border-radius:14px 14px 0 0;width:100%;max-width:480px;max-height:70vh;overflow-y:auto;padding:0 16px 20px;margin:0 auto;transform:translateY(30px);transition:.15s}
.pr.open .ps{transform:translateY(0)}.pr .ps .mh{width:32px;height:4px;background:#e2e8f0;border-radius:2px;margin:8px auto 12px}
.pr .ps h3{font-size:.95rem;margin-bottom:10px}
.pli{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #e2e8f0}
.pli .pn{flex:1;font-size:.85rem;font-weight:600;color:#1e293b}.pli .pn small{font-size:.72rem;color:#94a3b8;margin-left:6px;font-weight:400}
.pr .ad{display:flex;gap:6px;padding:10px 0}.pr .ad input{flex:1;padding:7px 9px;border:1px solid #e2e8f0;border-radius:5px;font-size:.82rem}
.pr .ad button{padding:7px 14px;border:none;border-radius:5px;background:#2563eb;color:#fff;font-size:.78rem;cursor:pointer}
</style>
</head><body>

<div class="nav"><div class="nb" id="profileBtn">流水账</div>
<div class="nt" id="navTabs">
<button class="a" data-v="timeline">时间线</button><button data-v="ledger">记账</button>
<button data-v="events">事件</button><button data-v="plans">计划</button><button data-v="stats">统计</button>
</div></div>

<div class="mn" id="app">

<button data-f="all" class="a">全部</button><button data-f="expense">支出</button>
<button data-f="income">收入</button><button data-f="event">事件</button><button data-f="plan">计划</button>
</div><input type="month" id="mf">

</div><div id="content"></div></div>

<div class="mo" id="modal"><div class="ms"><div class="mh"></div>
<h3 id="modalTitle">添加记录</h3>

<button data-t="expense" class="ta">支出</button><button data-t="income" class="tn">收入</button>
<button data-t="event" class="tn">事件</button><button data-t="plan" class="tn">计划</button></div>
<form id="form">
<div id="txnFields"><div class="fr">

<div class="fg"><label>时间</label><input type="time" id="fTime"></div></div>
<input type="hidden" id="fEditId"><button type="submit" class="btn-p" id="fSubmit">添加</button>
</form></div></div>

<div class="pr" id="profilePanel"><div class="ps"><div class="mh"></div>
<h3>账号管理</h3><div id="profileList"></div>
<div class="ad"><input type="text" id="newProfileName" placeholder="新账号名称"><button id="btnAddProfile">添加</button></div>
<button class="btn-s" id="btnImport">导入备份</button>
<input type="file" id="fileInput" accept=".json" style="display:none">
</div></div><script>
const CE=["外卖","交通","生活","餐饮","购物","娱乐","居住","医疗","教育","通讯","日用","其他"];
const CI=["工资","兼职","投资","红包","报销","其他"];
const CV=["社交","工作","健康","旅行","家庭","学习","纪念日","生活","其他"];
const CC={社交:"#f59e0b",工作:"#3b82f6",健康:"#10b981",旅行:"#8b5cf6",家庭:"#ec4899",学习:"#14b8a6",纪念日:"#f97316",生活:"#6366f1",其他:"#94a3b8"};
const SK="lsz_data",PK="lsz_profiles",CK="lsz_cur";
function gp(){try{let d=localStorage.getItem(PK);return d?JSON.parse(d):[]}catch{return[]}}
function sp(p){localStorage.setItem(PK,JSON.stringify(p))}
function gc(){return localStorage.getItem(CK)||""}
function sc(id){localStorage.setItem(CK,id)}
function ep(){let ps=gp(),c=gc();if(ps.length===0){let id=Date.now().toString(36);ps.push({id,name:"默认账号",createdAt:Date.now()});sp(ps);sc(id);sd(id,{transactions:[],events:[],plans:[]})}else if(!c||!ps.find(p=>p.id===c)){sc(ps[0].id)}}
function dk(){return SK+"_"+gc()}
function ld(){try{let d=localStorage.getItem(dk());return d?JSON.parse(d):{transactions:[],events:[],plans:[]}}catch{return{transactions:[],events:[],plans:[]}}}
function sd(id,d){localStorage.setItem(dk(),JSON.stringify(d))}
function gi(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
let data,view="timeline",ft="all",fm="",mm="add";
function ts(){let d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function tm(){return ts().slice(0,7)}
function fn(n){return Number(n).toLocaleString("zh-CN",{minimumFractionDigits:2,maximumFractionDigits:2})}
function dl(ds){let d=new Date(ds+"T00:00:00"),wk=["日","一","二","三","四","五","六"];return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日 星期"+wk[d.getDay()]}
function esc(s){if(!s)return"";let x=document.createElement("div");x.textContent=s;return x.innerHTML}
function cs(){let txn=data.transactions.filter(t=>!fm||(t.date&&t.date.startsWith(fm)));let i=0,e=0;txn.forEach(t=>{if(t.type==="income")i+=Number(t.amount)||0;else e+=Number(t.amount)||0});return{income:i,expense:e,balance:i-e}}
function us(){let s=cs();document.getElementById("sInc").textContent="¥"+fn(s.income);document.getElementById("sExp").textContent="¥"+fn(s.expense);document.getElementById("sBal").textContent="¥"+fn(s.balance)}
function ge(v){let txn=data.transactions.map(t=>({...t,_t:"txn"})),evt=data.events.map(e=>({...e,_t:"evt"})),pln=data.plans.map(p=>({...p,_t:"pln"}));if(fm){txn=txn.filter(t=>t.date&&t.date.startsWith(fm));evt=evt.filter(e=>e.date&&e.date.startsWith(fm));pln=pln.filter(p=>p.date&&p.date.startsWith(fm))}if(v==="ledger")return txn.filter(t=>ft==="all"||t.type===ft);if(v==="events")return evt;if(v==="plans")return pln;if(ft==="expense"){evt=[];pln=[];txn=txn.filter(t=>t.type==="expense")}else if(ft==="income"){evt=[];pln=[];txn=txn.filter(t=>t.type==="income")}else if(ft==="event"){txn=[];pln=[]}else if(ft==="plan"){txn=[];evt=[]}return[...txn,...evt,...pln].sort((a,b)=>b.date.localeCompare(a.date)||((b.time||"").localeCompare(a.time||"")))}
function ra(){us();if(view==="stats"){rs();return}let es=ge(view);let h="",last="";if(es.length===0){document.getElementById("content").innerHTML="<div style=\"padding:40px;text-align:center;color:#94a3b8\"><p>暂无记录</p></div>";return}if(view==="plans"){let tot=es.length,done=es.filter(p=>p.status==="done").length,pct=tot>0?Math.round(done/tot*100):0;h="<div class=\"prg\"><span style=\"font-size:.7rem;color:#64748b\">计划完成</span><span style=\"font-size:.8rem;font-weight:700;color:#1e293b\">"+done+"/"+tot+"</span><div class=\"pb\"><div class=\"pf\" style=\"width:"+pct+"%\"></div></div><span style=\"font-size:.7rem;font-weight:600;color:#10b981\">"+pct+"%</span></div>"}
es.forEach(e=>{if(e.date!==last){last=e.date;h+="<div class=\"dh\">"+dl(e.date)+"</div>"}
if(e._t==="txn"){let c=e.type==="income"?"i":"e",sg=e.type==="income"?"+":"-";h+="<div class=\"entry\" data-id=\""+e.id+"\" data-t=\"txn\"><div class=\"ei "+c+"\">"+(e.type==="income"?"💰":"💸")+"</div><div class=\"eb\"><div class=\"et\"><span class=\"bd "+c+"\">"+esc(e.category||"")+"</span><span class=\"ea "+c+"\">"+sg+"¥"+fn(e.amount)+"</span></div><div class=\"etl\">"+esc(e.note||"")+"</div>"+(e.time?"<div class=\"em\">"+esc(e.time)+"</div>":"")+"</div></div>"}
else if(e._t==="evt"){let c=e.category||"",d=CC[c]||"#94a3b8",m=e.loc?"📍"+esc(e.loc):"";if(e.time)m+=(e.loc?" ":"")+"🕐"+esc(e.time);h+="<div class=\"entry\" data-id=\""+e.id+"\"><div class=\"ei ev\">📅</div><div class=\"eb\"><div class=\"et\"><span class=\"bd ev\" style=\"background:"+d+"22;color:"+d+"\">"+esc(c)+"</span></div><div class=\"etl\">"+esc(e.title||"")+"</div>"+(m?"<div class=\"em\">"+m+"</div>":"")+"</div></div>"}
else{let c=e.category||"",s=e.status==="done",m=e.loc?"📍"+esc(e.loc):"";if(e.time)m+=(e.loc?" ":"")+"🕐"+esc(e.time);h+="<div class=\"entry\" data-id=\""+e.id+"\"><div class=\"ei p\">📌</div><div class=\"eb\"><div class=\"et\"><span class=\"bd p\">"+esc(c)+"</span><span class=\"es "+(s?"d":"p")+"\" style=\"margin-left:auto\">"+(s?"✓ 已完成":"⏳ 待做")+"</span></div><div class=\"etl\">"+esc(e.title||"")+"</div>"+(m?"<div class=\"em\">"+m+"</div>":"")+"</div></div>"}});document.getElementById("content").innerHTML=h}
function rs(){let s=cs();let txn=data.transactions.filter(t=>!fm||(t.date&&t.date.startsWith(fm)));let ec={},ic={};txn.forEach(t=>{let c=t.category||"其他",a=Number(t.amount)||0;if(t.type==="expense")ec[c]=(ec[c]||0)+a;else ic[c]=(ic[c]||0)+a});let et=s.expense,it=s.income;let pt=data.plans.filter(p=>!fm||(p.date&&p.date.startsWith(fm))).length;let pd=data.plans.filter(p=>p.status==="done"&&(!fm||(p.date&&p.date.startsWith(fm)))).length;let h="<div class=\"sg\"><div class=\"sc\"><div style=\"font-size:.68rem;color:#64748b\">收入</div><div class=\"v g\">¥"+fn(it)+"</div></div><div class=\"sc\"><div style=\"font-size:.68rem;color:#64748b\">支出</div><div class=\"v r\">¥"+fn(et)+"</div></div><div class=\"sc\"><div style=\"font-size:.68rem;color:#64748b\">余额</div><div class=\"v\" style=\"color:"+(s.balance>=0?"#10b981":"#ef4444")+"\">¥"+fn(s.balance)+"</div></div><div class=\"sc\"><div style=\"font-size:.68rem;color:#64748b\">计划完成</div><div class=\"v p\">"+pd+"/"+pt+"</div></div></div>";let mc=["#ef4444","#f97316","#eab308","#22c55e","#3b82f6","#8b5cf6","#ec4899","#14b8a6","#6366f1","#94a3b8"];h+="<div class=\"bk\"><div class=\"bt\">支出分类</div>";if(et>0){Object.entries(ec).sort((a,b)=>b[1]-a[1]).forEach(([cat,amt],i)=>{let p=(amt/et*100).toFixed(1);h+="<div class=\"br\"><span class=\"dot\" style=\"background:"+mc[i%mc.length]+"\"></span>"+cat+"<span class=\"ba\">¥"+fn(amt)+"</span><span class=\"bp\">"+p+"%</span></div>"})}else h+="<p style=\"font-size:.82rem;color:#94a3b8;padding:4px 0\">暂无支出</p>";h+="</div>";h+="<div class=\"bk\"><div class=\"bt\">收入分类</div>";if(it>0){Object.entries(ic).sort((a,b)=>b[1]-a[1]).forEach(([cat,amt])=>{let p=(amt/it*100).toFixed(1);h+="<div class=\"br\"><span class=\"dot\" style=\"background:#10b981\"></span>"+cat+"<span class=\"ba\">¥"+fn(amt)+"</span><span class=\"bp\">"+p+"%</span></div>"})}else h+="<p style=\"font-size:.82rem;color:#94a3b8;padding:4px 0\">暂无收入</p>";h+="</div>";document.getElementById("content").innerHTML=h}
document.addEventListener("DOMContentLoaded",function(){ep();data=ld();if(!fm)fm=tm();document.getElementById("mf").value=fm;
var elnavTabs=document.getElementById("navTabs");if(elnavTabs)elnavTabs.addEventListener("click",function(e){let btn=e.target.closest(".nt button");if(!btn)return;document.querySelectorAll(".nt button").forEach(t=>t.classList.remove("a"));btn.classList.add("a");view=btn.dataset.v;ra()});
var eltf=document.getElementById("tf");if(eltf)eltf.addEventListener("click",function(e){let btn=e.target.closest(".sg button");if(!btn)return;document.querySelectorAll("#tf button").forEach(b=>b.classList.remove("a"));btn.classList.add("a");ft=btn.dataset.f;ra()});
var elmf=document.getElementById("mf");if(elmf)elmf.addEventListener("change",function(){fm=document.getElementById("mf").value;ra()});
var elbtnAdd=document.getElementById("btnAdd");if(elbtnAdd)elbtnAdd.addEventListener("click",function(){document.getElementById("modal").classList.add("open");document.getElementById("form").reset();document.getElementById("fEditId").value="";document.getElementById("fDate").value=ts();document.getElementById("modalTitle").textContent="添加记录";document.getElementById("fSubmit").textContent="添加"});
var elmodal=document.getElementById("modal");if(elmodal)elmodal.addEventListener("click",function(e){if(e.target.classList.contains("mo"))document.getElementById("modal").classList.remove("open")});
var eltypeToggle=document.getElementById("typeToggle");if(eltypeToggle)eltypeToggle.addEventListener("click",function(e){let btn=e.target.closest(".tt button");if(!btn)return;document.querySelectorAll("#typeToggle button").forEach(b=>b.className=b.dataset.t===btn.dataset.t?"ta":"tn");let t=btn.dataset.t;if(t==="event"||t==="plan"){document.getElementById("txnFields").style.display="none";document.getElementById("evtFields").style.display="block"}else{document.getElementById("txnFields").style.display="block";document.getElementById("evtFields").style.display="none"}});
var elform=document.getElementById("form");if(elform)elform.addEventListener("submit",function(e){e.preventDefault();let tp=document.querySelector("#typeToggle .ta");tp=tp?tp.dataset.t:"expense";let dt=document.getElementById("fDate").value;let tm2=document.getElementById("fTime").value;let eid=document.getElementById("fEditId").value;
if(tp==="event"||tp==="plan"){let obj={title:document.getElementById("fTitle").value.trim(),category:document.getElementById("fEvtCat").value,loc:document.getElementById("fLoc").value.trim(),description:document.getElementById("fDesc").value.trim(),date:dt,time:tm2};if(tp==="plan")obj.status="pending";if(eid){if(tp==="event"){let i=data.events.findIndex(x=>x.id===eid);if(i>-1){Object.assign(data.events[i],obj);sd(data)}}else{let i=data.plans.findIndex(x=>x.id===eid);if(i>-1){Object.assign(data.plans[i],obj);sd(data)}}}else{obj.id=gi();obj.createdAt=Date.now();if(tp==="event")data.events.push(obj);else data.plans.push(obj);sd(data)}}
