<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#2563eb">
<title>流水账 — 记账 &amp; 事件 &amp; 计划</title>
<style>
:root{--p:#2563eb;--pl:#dbeafe;--i:#10b981;--ib:#d1fae5;--e:#ef4444;--eb:#fee2e2;--ev:#8b5cf6;--evb:#ede9fe;--pln:#f59e0b;--plb:#fef3c7;--bg:#f1f5f9;--s:#fff;--b:#e2e8f0;--t:#1e293b;--t2:#64748b;--t3:#94a3b8;--r:8px;--nh:52px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,sans-serif;background:var(--bg);color:var(--t);line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.nav{position:sticky;top:0;z-index:100;background:var(--s);border-bottom:1px solid var(--b);height:var(--nh);display:flex;align-items:center;padding:0 12px;gap:4px}
.nav-b{font-weight:700;font-size:1rem;white-space:nowrap;display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--t)}
.nav-b span{color:var(--p)}
.nav-b .ar{font-size:.7rem;color:var(--t3);transition:.15s}
.nt{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none;margin:0 4px}
.nt::-webkit-scrollbar{display:none}
.nt button{padding:5px 10px;border:none;background:transparent;color:var(--t2);font-size:.8rem;cursor:pointer;border-radius:5px;white-space:nowrap;flex-shrink:0}
.nt button:hover{background:var(--bg);color:var(--t)}
.nt button.a{background:var(--pl);color:var(--p);font-weight:600}
.na{display:flex;gap:4px}
.na button{width:32px;height:32px;border:none;border-radius:5px;background:transparent;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;color:var(--t2)}
.na button:hover{background:var(--bg);color:var(--t)}
.mn{max-width:820px;margin:0 auto;padding:12px}
.fb{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.fb .sg{display:flex;background:var(--s);border:1px solid var(--b);border-radius:5px;overflow:hidden}
.fb .sg button{padding:4px 10px;border:none;background:transparent;color:var(--t2);font-size:.75rem;cursor:pointer;white-space:nowrap}
.fb .sg button:hover{background:var(--bg)}
.fb .sg button.a{background:var(--p);color:#fff;font-weight:600}
.fb input[type=month]{padding:4px 8px;border:1px solid var(--b);border-radius:5px;font-size:.75rem;background:var(--s);color:var(--t)}
.fb .sb{margin-left:auto;font-size:.72rem;color:var(--t2);display:flex;gap:10px}
.fb .sb strong{color:var(--t)}
.fb .sb .g{color:var(--i)}
.fb .sb .r{color:var(--e)}
.dh{padding:8px 0 3px;font-size:.72rem;font-weight:600;color:var(--t3);border-bottom:1px solid var(--b);margin-top:6px}
.entry{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--s);border-radius:var(--r);margin-top:6px;box-shadow:0 1px 2px rgba(0,0,0,.06);position:relative}
.ei{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.ei.e{background:var(--eb);color:var(--e)}.ei.i{background:var(--ib);color:var(--i)}.ei.ev{background:var(--evb);color:var(--ev)}.ei.p{background:var(--plb);color:var(--pln)}
.eb{flex:1;min-width:0}
.et{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.bd{font-size:.63rem;font-weight:600;padding:1px 6px;border-radius:3px}
.bd.e{background:var(--eb);color:var(--e)}.bd.i{background:var(--ib);color:var(--i)}.bd.ev{background:var(--evb);color:var(--ev)}.bd.p{background:var(--plb);color:var(--pln)}
.ea{font-weight:700;font-size:.85rem;margin-left:auto}
.ea.e{color:var(--e)}.ea.i{color:var(--i)}
.etl{font-size:.82rem;color:var(--t);margin-top:1px;font-weight:500}
.em{font-size:.68rem;color:var(--t3);margin-top:1px;display:flex;gap:6px;flex-wrap:wrap}
.es{font-size:.66rem;display:flex;align-items:center;gap:3px}
.es.d{color:var(--i)}.es.pd{color:var(--pln)}
.eac{position:absolute;top:6px;right:6px;display:flex;gap:2px;opacity:0}
.entry:hover .eac{opacity:1}
.eac button{width:26px;height:26px;border:none;border-radius:4px;background:transparent;cursor:pointer;font-size:.75rem;color:var(--t3);display:flex;align-items:center;justify-content:center}
.eac button:hover{background:var(--bg);color:var(--t)}
.eac button.dl:hover{background:var(--eb);color:var(--e)}
.prg{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--s);border-radius:var(--r);margin-bottom:6px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.prg .pl{font-size:.66rem;color:var(--t2)}
.prg .pv{font-size:.8rem;font-weight:700;color:var(--t)}
.prg .pb{flex:1;background:var(--bg);border-radius:3px;height:6px;overflow:hidden}
.prg .pf{height:6px;border-radius:3px;background:var(--i)}
.prg .pp{font-size:.66rem;color:var(--i);font-weight:600}
.emp{text-align:center;padding:40px 16px;color:var(--t3)}
.emp .ei2{font-size:2rem}.emp p{font-size:.85rem;margin-top:4px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sc{background:var(--s);border-radius:7px;padding:10px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.sc .l{font-size:.68rem;color:var(--t2)}.sc .v{font-size:1rem;font-weight:700;margin-top:1px}
.sc .v.g{color:var(--i)}.sc .v.r{color:var(--e)}.sc .v.p{color:var(--ev)}
.bk{background:var(--s);border-radius:7px;padding:10px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:8px}
.bk .bt{font-size:.72rem;color:var(--t2);margin-bottom:5px;font-weight:600}
.bk .br{display:flex;align-items:center;gap:5px;padding:3px 0;font-size:.72rem}
.bk .br .dot{width:6px;height:6px;border-radius:3px;flex-shrink:0}
.bk .br .bn{flex:1;color:var(--t)}.bk .br .ba{font-weight:600;color:var(--t)}
.bk .br .bp{color:var(--t3);width:28px;text-align:right;font-size:.65rem}
.bk .bb{background:var(--bg);border-radius:2.5px;height:4px;overflow:hidden;margin-top:1px}
.bk .bf{height:4px;border-radius:2.5px}
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--s);border-top:1px solid var(--b);display:flex;height:52px;z-index:100;max-width:820px;margin:0 auto}
.bn .bi{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:.58rem;color:var(--t3);border:none;background:transparent;cursor:pointer;padding:2px 0}
.bn .bi .ni{font-size:.95rem}.bn .bi.a{color:var(--p)}
.mn{padding-bottom:64px}
.fab{position:fixed;bottom:64px;right:max(12px,calc(50vw - 400px + 12px));width:44px;height:44px;border:none;border-radius:50%;background:var(--p);color:#fff;font-size:1.15rem;cursor:pointer;box-shadow:0 3px 10px rgba(37,99,235,.35);z-index:200;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(.92)}
.mo{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:300;display:flex;align-items:flex-end;justify-content:center;padding:0;opacity:0;pointer-events:none;transition:.15s}
.mo.open{opacity:1;pointer-events:auto}
.mo .ms{background:var(--s);border-radius:14px 14px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:0 16px 20px;transform:translateY(30px)}
.mo.open .ms{transform:translateY(0)}
.mo .ms .mh{width:32px;height:4px;background:var(--b);border-radius:2px;margin:8px auto 12px}
.mo .ms h3{font-size:.95rem;margin-bottom:10px}
.tt{display:flex;gap:4px;margin-bottom:10px}
.tt button{flex:1;padding:6px 4px;border:none;border-radius:5px;font-size:.72rem;cursor:pointer}
.tt .ta{background:var(--p);color:#fff;font-weight:600}
.tt .tn{background:var(--bg);color:var(--t2)}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:.72rem;font-weight:600;color:var(--t2);margin-bottom:2px}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 9px;border:1px solid var(--b);border-radius:5px;font-size:.82rem;background:var(--s);color:var(--t);font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 2px var(--pl)}
.fg textarea{resize:vertical;min-height:50px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-p{width:100%;padding:9px;border:none;border-radius:5px;background:var(--p);color:#fff;font-size:.82rem;font-weight:600;cursor:pointer}
.btn-s{width:100%;padding:9px;border:1px solid var(--b);border-radius:5px;background:var(--s);color:var(--t2);font-size:.82rem;cursor:pointer;margin-top:4px}
.pr{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:400;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:.15s}
.pr.open{opacity:1;pointer-events:auto}
.pr .ps{background:var(--s);border-radius:14px 14px 0 0;width:100%;max-width:480px;max-height:70vh;overflow-y:auto;padding:0 16px 20px;margin:0 auto;transform:translateY(30px)}
.pr.open .ps{transform:translateY(0)}
.pr .ps .mh{width:32px;height:4px;background:var(--b);border-radius:2px;margin:8px auto 12px}
.pr .ps h3{font-size:.95rem;margin-bottom:10px}
.pli{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--b)}
.pli .pn{flex:1;font-size:.85rem;font-weight:600;color:var(--t)}
.pli .pn small{font-weight:400;color:var(--t3);font-size:.72rem;margin-left:6px}
.pli .ck{color:var(--p);font-size:1rem}
.pli .dl{color:var(--t3);cursor:pointer;font-size:.85rem;padding:4px}
.pli .dl:hover{color:var(--e)}.pli:last-child{border:none}
.pr .ad{padding:10px 0;display:flex;gap:6px}
.pr .ad input{flex:1;padding:7px 9px;border:1px solid var(--b);border-radius:5px;font-size:.82rem}
.pr .ad input:focus{outline:none;border-color:var(--p)}
.pr .ad button{padding:7px 14px;border:none;border-radius:5px;background:var(--p);color:#fff;font-size:.78rem;cursor:pointer;white-space:nowrap}
@media(max-width:600px){
  .nav{padding:0 8px}.nt button{padding:4px 8px;font-size:.75rem}
  .fb .sb{width:100%;justify-content:space-between}
  .sg{grid-template-columns:1fr 1fr}.fab{right:12px}
  .eac{opacity:1}.entry{padding-right:32px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-b" id="profileBtn">📋 <span>流水账</span> <span class="ar">▾</span></div>
  <div class="nt" id="navTabs">
    <button class="a" data-v="timeline">时间线</button>
    <button data-v="ledger">记账</button>
    <button data-v="events">事件</button>
    <button data-v="plans">计划</button>
    <button data-v="stats">统计</button>
  </div>
  <div class="na"><button id="btnBackup" title="导出备份">💾</button></div>
</nav>

<div class="mn" id="app">
  <div class="fb" id="fb">
    <div class="sg" id="tf">
      <button data-f="all" class="a">全部</button>
      <button data-f="expense">支出</button>
      <button data-f="income">收入</button>
      <button data-f="event">事件</button>
      <button data-f="plan">计划</button>
    </div>
    <input type="month" id="mf">
    <div class="sb" id="sb">
      <span>收入<strong class="g" id="sInc">¥0</strong></span>
      <span>支出<strong class="r" id="sExp">¥0</strong></span>
      <span>余额<strong id="sBal">¥0</strong></span>
    </div>
  </div>
  <div id="content"></div>
</div>

<button class="fab" id="btnAdd">＋</button>

<div class="mo" id="modal">
  <div class="ms">
    <div class="mh"></div>
    <h3 id="modalTitle">添加记录</h3>
    <div class="tt" id="typeToggle">
      <button data-t="expense" class="ta">💸 支出</button>
      <button data-t="income" class="tn">💰 收入</button>
      <button data-t="event" class="tn">📅 事件</button>
      <button data-t="plan" class="tn">📌 计划</button>
    </div>
    <form id="form">
      <div id="txnFields">
        <div class="fr">
          <div class="fg"><label>金额</label><input type="number" step="0.01" min="0" id="fAmt" placeholder="0.00"></div>
          <div class="fg"><label>分类</label><select id="fCat"></select></div>
        </div>
        <div class="fg"><label>备注</label><input type="text" id="fNote" placeholder="备注"></div>
      </div>
      <div id="evtFields" style="display:none">
        <div class="fg"><label>标题</label><input type="text" id="fTitle" placeholder="事件名称"></div>
        <div class="fr">
          <div class="fg"><label>分类</label><select id="fEvtCat"></select></div>
          <div class="fg"><label>地点</label><input type="text" id="fLoc" placeholder="可选"></div>
        </div>
        <div class="fg"><label>描述</label><textarea id="fDesc" placeholder="补充信息"></textarea></div>
      </div>
      <div class="fr">
        <div class="fg"><label>日期</label><input type="date" id="fDate"></div>
        <div class="fg"><label>时间</label><input type="time" id="fTime"></div>
      </div>
      <input type="hidden" id="fEditId">
      <button type="submit" class="btn-p" id="fSubmit">添加</button>
    </form>
  </div>
</div>

<div class="pr" id="profilePanel">
  <div class="ps">
    <div class="mh"></div>
    <h3>账号管理</h3>
    <div id="profileList"></div>
    <div class="ad">
      <input type="text" id="newProfileName" placeholder="新账号名称">
      <button id="btnAddProfile">添加</button>
    </div>
    <button class="btn-s" id="btnImport">📥 导入备份</button>
    <input type="file" id="fileInput" accept=".json" style="display:none">
  </div>
</div>

<script>
const PK='liushuizhang_profiles',CK='liushuizhang_cur';
function gp(){try{return JSON.parse(localStorage.getItem(PK))||[]}catch{return[]}}
function sp(p){localStorage.setItem(PK,JSON.stringify(p))}
function gc(){return localStorage.getItem(CK)||''}
function sc(id){localStorage.setItem(CK,id)}
function initP(){let ps=gp(),cur=gc();if(!ps.length){let id=genId();ps=[{id,name:'默认账号',createdAt:Date.now()}];sp(ps);sc(id);savePd(id,emptyD());}else if(!cur||!ps.find(p=>p.id===cur)){sc(ps[0].id)}return gc()}
function gPro(){let id=gc();return gp().find(p=>p.id===id)||gp()[0]}
function rP(){let ps=gp(),cur=gc();document.getElementById('profileList').innerHTML=ps.map(p=>'<div class=\"pli\"><span class=\"pn\">'+esc(p.name)+'<small>'+(p.id===cur?'当前':'')+'</small></span>'+(p.id===cur?'<span class=\"ck\">✓</span>':'<span class=\"ck\" style=\"cursor:pointer;opacity:.4\" onclick=\"swP(\"'+p.id+'\")\">切换</span>')+(ps.length>1?'<span class=\"dl\" onclick=\"delP(\"'+p.id+'\")\">✕</span>':'')+'</div>').join('')}
function swP(id){sc(id);rP();clP();refresh()}
function delP(id){if(gp().length<=1)return;if(!confirm('确定删除账号吗？数据将丢失。'))return;let ps=gp().filter(p=>p.id!==id);localStorage.removeItem('ld_'+id);sp(ps);if(gc()===id)sc(ps[0].id);rP();refresh()}
function addP(name){if(!name.trim())return;let id=genId(),ps=gp();ps.push({id,name:name.trim(),createdAt:Date.now()});sp(ps);savePd(id,emptyD());swP(id)}

const CE=['外卖','交通','生活','餐饮','购物','娱乐','居住','医疗','教育','通讯','日用','其他'];
const CI=['工资','兼职','投资','红包','报销','其他'];
const CV=['社交','工作','健康','旅行','家庭','学习','纪念日','生活','其他'];
const CP=['工作','生活','旅行','学习','健康','社交','其他'];
function dk(id){return 'ld_'+id}
function emptyD(){return{transactions:[],events:[],plans:[]}}
function lpd(id){try{return JSON.parse(localStorage.getItem(dk(id)))||emptyD()}catch{return emptyD()}}
function savePd(id,d){localStorage.setItem(dk(id),JSON.stringify(d))}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
let data,curId;
function refresh(){curId=gc();data=lpd(curId);if(!filterMonth)filterMonth=thisM();document.getElementById('mf').value=filterMonth;render();rP();let p=gPro();document.querySelector('.nav-b').innerHTML='📋 <span>流水账</span> <small style=\"font-weight:400;font-size:.72rem;color:var(--t3)\">'+esc(p?p.name:'')+'</small> <span class=\"ar\">▾</span>'}
function scd(){savePd(curId,data)}
function addTxn(t){t.id=genId();t.createdAt=Date.now();data.transactions.push(t);scd();render()}
function updTxn(id,f){let i=data.transactions.findIndex(x=>x.id===id);if(i>-1){Object.assign(data.transactions[i],f);scd();render()}}
function delTxn(id){data.transactions=data.transactions.filter(x=>x.id!==id);scd();render()}
function addEvt(e){e.id=genId();e.createdAt=Date.now();data.events.push(e);scd();render()}
function updEvt(id,f){let i=data.events.findIndex(x=>x.id===id);if(i>-1){Object.assign(data.events[i],f);scd();render()}}
function delEvt(id){data.events=data.events.filter(x=>x.id!==id);scd();render()}
function addPlan(p){p.id=genId();p.createdAt=Date.now();p.status=p.status||'pending';data.plans.push(p);scd();render()}
function updPlan(id,f){let i=data.plans.findIndex(x=>x.id===id);if(i>-1){Object.assign(data.plans[i],f);scd();render()}}
function delPlan(id){data.plans=data.plans.filter(x=>x.id!==id);scd();render()}

let view='timeline',fType='all',fMonth='';
function todayS(){let d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function thisM(){return todayS().slice(0,7)}
function esc(s){let d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmt(n){return Number(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}

function render(){let st=cs();document.getElementById('sInc').textContent='¥'+fmt(st.income);document.getElementById('sExp').textContent='¥'+fmt(st.expense);document.getElementById('sBal').textContent='¥'+fmt(st.balance);if(view==='stats'){rStats();return};if(view==='timeline')rTL();else if(view==='ledger')rLed();else if(view==='events')rEvt();else if(view==='plans')rPln()}

function getE(v){let txn=data.transactions.map(t=>({...t,_t:'txn'})),evt=data.events.map(e=>({...e,_t:'evt'})),pln=data.plans.map(p=>({...p,_t:'pln'}));if(fMonth){txn=txn.filter(t=>t.date&&t.date.startsWith(fMonth));evt=evt.filter(e=>e.date&&e.date.startsWith(fMonth));pln=pln.filter(p=>p.date&&p.date.startsWith(fMonth))}if(v==='ledger'){txn=txn.filter(t=>fType==='all'||t.type===fType);return txn}if(v==='events')return evt;if(v==='plans')return pln;if(fType==='expense'){evt=[];pln=[];txn=txn.filter(t=>t.type==='expense')}else if(fType==='income'){evt=[];pln=[];txn=txn.filter(t=>t.type==='income')}else if(fType==='event'){txn=[];pln=[]}else if(fType==='plan'){txn=[];evt=[]}let all=[...txn,...evt,...pln];all.sort((a,b)=>b.date.localeCompare(a.date)||((b.time||'').localeCompare(a.time||'')));return all}

function cs(){let txn=data.transactions.filter(t=>!fMonth||(t.date&&t.date.startsWith(fMonth)));let inc=0,exp=0;txn.forEach(t=>{if(t.type==='income')inc+=Number(t.amount)||0;else exp+=Number(t.amount)||0});return{income:inc,expense:exp,balance:inc-exp}}
function dL(ds){let d=new Date(ds+'T00:00:00');return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'}

function rTL(){let es=getE('timeline');if(!es.length){document.getElementById('content').innerHTML='<div class=\"emp\"><div class=\"ei2\">📭</div><p>这个月还没有记录</p></div>';return}let h='',last='';es.forEach(e=>{if(e.date!==last){last=e.date;h+='<div class=\"dh\">'+dL(e.date)+'</div>'}h+=card(e)});document.getElementById('content').innerHTML=h}
function rLed(){let es=getE('ledger');if(!es.length){document.getElementById('content').innerHTML='<div class=\"emp\"><div class=\"ei2\">📊</div><p>暂无记账记录</p></div>';return}let h='',last='';es.forEach(e=>{if(e.date!==last){last=e.date;h+='<div class=\"dh\">'+dL(e.date)+'</div>'}h+=card(e)});document.getElementById('content').innerHTML=h}
function rEvt(){let es=getE('events');if(!es.length){document.getElementById('content').innerHTML='<div class=\"emp\"><div class=\"ei2\">📅</div><p>暂无事件记录</p></div>';return}let h='',last='';es.forEach(e=>{if(e.date!==last){last=e.date;h+='<div class=\"dh\">'+dL(e.date)+'</div>'}h+=card(e)});document.getElementById('content').innerHTML=h}
function rPln(){let es=getE('plans');if(!es.length){document.getElementById('content').innerHTML='<div class=\"emp\"><div class=\"ei2\">📌</div><p>暂无计划</p></div>';return}let tot=es.length,done=es.filter(p=>p.status==='done').length,pct=tot>0?Math.round(done/tot*100):0;let h='<div class=\"prg\"><span class=\"pl\">计划完成</span><span class=\"pv\">'+done+'/'+tot+'</span><div class=\"pb\"><div class=\"pf\" style=\"width:'+pct+'%\"></div></div><span class=\"pp\">'+pct+'%</span></div>';let last='';es.forEach(e=>{if(e.date!==last){last=e.date;h+='<div class=\"dh\">'+dL(e.date)+'</div>'}h+=card(e)});document.getElementById('content').innerHTML=h}

function card(e){if(e._t==='txn'){let cls=e.type==='income'?'i':'e',sign=e.type==='income'?'+':'-',ico=e.type==='income'?'💰':'💸';return'<div class=\"entry\" data-id=\"'+e.id+'\" data-t=\"txn\"><div class=\"ei '+cls+'\">'+ico+'</div><div class=\"eb\"><div class=\"et\"><span class=\"bd '+cls+'\">'+esc(e.category||'其他')+'</span><span class=\"ea '+cls+'\">'+sign+'¥'+fmt(e.amount)+'</span></div><div class=\"etl\">'+esc(e.note||'(无备注)')+'</div>'+(e.time?'<div class=\"em\">🕐 '+esc(e.time)+'</div>':'')+'</div><div class=\"eac\"><button class=\"ed\" onclick=\"editE(\"'+e.id+'\",\"txn\")\">✎</button><button class=\"dl\" onclick=\"delE(\"'+e.id+'\",\"txn\")\">✕</button></div></div>'}
if(e._t==='evt'){let c=e.category||'其他',cm={社交:'#f59e0b',工作:'#3b82f6',健康:'#10b981',旅行:'#8b5cf6',家庭:'#ec4899',学习:'#14b8a6',纪念日:'#f97316',生活:'#6366f1',其他:'#94a3b8'},dot=cm[c]||'#94a3b8';return'<div class=\"entry\" data-id=\"'+e.id+'\" data-t=\"evt\"><div class=\"ei ev\">📅</div><div class=\"eb\"><div class=\"et\"><span class=\"bd ev\" style=\"background:'+dot+'22;color:'+dot+'\">'+esc(c)+'</span></div><div class=\"etl\">'+esc(e.title||'(无标题)')+'</div><div class=\"em\">'+(e.loc?'📍 '+esc(e.loc):'')+(e.loc&&e.time?' ':'')+(e.time?'🕐 '+esc(e.time):'')+(e.description?'<br>'+esc(e.description):'')+'</div></div><div class=\"eac\"><button class=\"ed\" onclick=\"editE(\"'+e.id+'\",\"evt\")\">✎</button><button class=\"dl\" onclick=\"delE(\"'+e.id+'\",\"evt\")\">✕</button></div></div>'}
let c=e.category||'其他',s=e.status==='done';return'<div class=\"entry\" data-id=\"'+e.id+'\" data-t=\"pln\"><div class=\"ei p\">📌</div><div class=\"eb\"><div class=\"et\"><span class=\"bd p\">'+esc(c)+'</span><span class=\"es '+(s?'d':'pd')+'\" style=\"margin-left:auto\">'+(s?'✓ 已完成':'⏳ 待做')+'</span></div><div class=\"etl\">'+esc(e.title||'(无标题)')+'</div><div class=\"em\">'+(e.loc?'📍 '+esc(e.loc):'')+(e.loc&&e.time?' ':'')+(e.time?'🕐 '+esc(e.time):'')+'</div></div><div class=\"eac\"><button class=\"ed\" onclick=\"editE(\"'+e.id+'\",\"pln\")\">✎</button><button class=\"dl\" onclick=\"delE(\"'+e.id+'\",\"pln\")\">✕</button>'+(s?'':'<button class=\"ed\" onclick=\"toggleP(\"'+e.id+'\")\" style=\"color:var(--i)\" title=\"完成\">✓</button>')+'</div></div>'}

function rStats(){let st=cs();let txn=data.transactions.filter(t=>!fMonth||(t.date&&t.date.startsWith(fMonth)));let eC={},iC={};txn.forEach(t=>{let c=t.category||'其他',a=Number(t.amount)||0;if(t.type==='expense')eC[c]=(eC[c]||0)+a;else iC[c]=(iC[c]||0)+a});let eT=st.expense,iT=st.income;let pT=data.plans.filter(p=>!fMonth||(p.date&&p.date.startsWith(fMonth))).length;let pD=data.plans.filter(p=>p.status==='done'&&(!fMonth||(p.date&&p.date.startsWith(fMonth)))).length;let h='<div class=\"sg\"><div class=\"sc\"><div class=\"l\">收入</div><div class=\"v g\">¥'+fmt(iT)+'</div></div><div class=\"sc\"><div class=\"l\">支出</div><div class=\"v r\">¥'+fmt(eT)+'</div></div><div class=\"sc\"><div class=\"l\">余额</div><div class=\"v\" style=\"color:'+(st.balance>=0?'var(--i)':'var(--e)')+'\">¥'+fmt(st.balance)+'</div></div><div class=\"sc\"><div class=\"l\">计划完成</div><div class=\"v p\">'+pD+'/'+pT+'</div></div></div>'
h+='<div class=\"bk\"><div class=\"bt\">📉 支出分类</div>';if(eT>0){let mc=['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#6366f1','#94a3b8'];let s=Object.entries(eC).sort((a,b)=>b[1]-a[1]);s.forEach(([cat,amt],i)=>{let p=(amt/eT*100).toFixed(1);h+='<div class=\"br\"><span class=\"dot\" style=\"background:'+mc[i%mc.length]+'\"></span><span class=\"bn\">'+cat+'</span><span class=\"ba\">¥'+fmt(amt)+'</span><span class=\"bp\">'+p+'%</span></div><div class=\"bb\"><div class=\"bf\" style=\"width:'+p+'%;background:'+mc[i%mc.length]+'\"></div></div>'})}else h+='<p style=\"font-size:.82rem;color:var(--t3);padding:4px 0\">暂无支出</p>';h+='</div>'
h+='<div class=\"bk\"><div class=\"bt\">📈 收入分类</div>';if(iT>0){let mc=['#10b981','#34d399','#6ee7b7','#a7f3d0','#d1fae5'];let s=Object.entries(iC).sort((a,b)=>b[1]-a[1]);s.forEach(([cat,amt])=>{let p=(amt/iT*100).toFixed(1);h+='<div class=\"br\"><span class=\"dot\" style=\"background:#10b981\"></span><span class=\"bn\">'+cat+'</span><span class=\"ba\">¥'+fmt(amt)+'</span><span class=\"bp\">'+p+'%</span></div>'})}else h+='<p style=\"font-size:.82rem;color:var(--t3);padding:4px 0\">暂无收入</p>';h+='</div>'
document.getElementById('content').innerHTML=h}

function openM(mode,entry){mMode=mode;#modal.classList.add('open');#form.reset();#fEditId.value='';if(mode==='add'){#modalTitle.textContent='添加记录';#fSubmit.textContent='添加';#fDate.value=todayS();#fTime.value='';setT('expense')}else if(entry){#modalTitle.textContent='编辑记录';#fSubmit.textContent='保存';#fDate.value=entry.date||todayS();#fTime.value=entry.time||'';#fEditId.value=entry.id;if(entry._t==='txn'){setT(entry.type);#fAmt.value=entry.amount;#fCat.value=entry.category||'其他';#fNote.value=entry.note||''}else if(entry._t==='evt'){setT('event');#fTitle.value=entry.title||'';#fEvtCat.value=entry.category||'其他';#fLoc.value=entry.loc||'';#fDesc.value=entry.description||''}else{setT('plan');#fTitle.value=entry.title||'';#fEvtCat.value=entry.category||'其他';#fLoc.value=entry.loc||'';#fDesc.value=entry.description||''}}}
function clM(){#modal.classList.remove('open')}
function setT(type){document.querySelectorAll('#typeToggle button').forEach(b=>b.className=b.dataset.t===type?'ta':'tn');if(type==='event'||type==='plan'){#txnFields.style.display='none';#evtFields.style.display='block';#fAmt.removeAttribute('required')}else{#txnFields.style.display='block';#evtFields.style.display='none';#fAmt.setAttribute('required','');popC(type)}}
function gST(){let a=document.querySelector('#typeToggle .ta');return a?a.dataset.t:'expense'}
function popC(type){let cats=type==='income'?CI:CE;#fCat.innerHTML=cats.map(c=>'<option value=\"'+c+'\">'+c+'</option>').join('')}
function popEC(){#fEvtCat.innerHTML=CV.map(c=>'<option value=\"'+c+'\">'+c+'</option>').join('')}

function delE(id,t){if(!confirm('确定删除？'))return;if(t==='txn')delTxn(id);else if(t==='evt')delEvt(id);else delPlan(id)}
function editE(id,t){if(t==='txn'){let x=data.transactions.find(e=>e.id===id);if(x)openM('edit',{...x,_t:'txn'})}else if(t==='evt'){let x=data.events.find(e=>e.id===id);if(x)openM('edit',{...x,_t:'evt'})}else{let x=data.plans.find(e=>e.id===id);if(x)openM('edit',{...x,_t:'pln'})}}
function toggleP(id){let p=data.plans.find(x=>x.id===id);if(p){p.status='done';scd();render()}}

function expB(){let p=gPro();let blob=new Blob([JSON.stringify({version:1,exportedAt:Date.now(),profileName:p.name,data:data,stats:cs()},null,2)],{type:'application/json'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download='流水账_'+p.name+'_'+todayS()+'.json';a.click();URL.revokeObjectURL(url)}
function impB(file){let r=new FileReader();r.onload=function(e){try{let j=JSON.parse(e.target.result);if(j.data&&(j.data.transactions||j.data.events||j.data.plans)){let id=gc();data=j.data;scd();refresh();clP();alert('导入成功！')}else{alert('文件格式不正确')}}catch(err){alert('导入失败：'+err.message)}};r.readAsText(file)}
