name: Build APK
on:
  push: { branches: [main] }
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Android SDK platform
        run: echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-36"
      - name: Install Gradle
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gradle
      - name: Install Cordova
        run: npm install -g cordova
      - name: Build APK
        run: |
          cordova platform add android
          cordova build android
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 流水账-APK
          path: platforms/android/app/build/outputs/apk/debug/*.apk
